<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Practical Project</title>

    <!-- Bootstrap link -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">

    <!-- CSS -->
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<div id="app" class="container mt-4">

    <!-- My Name and Student Number -->
    <h1>Nwatarali Onyekachukwu 1259158</h1>

    <div class="row">

        <!-- Random user module -->
        <div class="col-md-4">
            <h3>Random User</h3>

            <!-- Image -->
            <img :src="userImage" class="img-fluid mb-2" v-if="userImage">

            <!-- Name -->
            <p>Name: {{ userName }}</p>

            <!-- Age -->
            <p>Age: {{ userAge }}</p>

            <!-- Button -->
            <button class="btn btn-primary" @click="getUser">Next User Profile</button>
        </div>

        <!-- Weather Module -->
        <div class="col-md-4">
            <h3>Weather</h3>

            <input class="form-control mb-2" placeholder="City" v-model="city">
            <input class="form-control mb-2" placeholder="Province" v-model="province">
            <input class="form-control mb-2" placeholder="Country" v-model="country">

            <button class="btn btn-success mb-2" @click="getWeather">Get Weather</button>

            <p>Temperature: {{ temperature }}</p>
            <p>Wind: {{ wind }}</p>
            <p>Description: {{ description }}</p>
        </div>

        <!-- Dictionary Module -->
        <div class="col-md-4">
            <h3>Dictionary</h3>

            <input class="form-control mb-2" placeholder="Enter word" v-model="word">

            <button class="btn btn-warning mb-2" @click="getDefinition">Define Word</button>

            <p>Word: {{ dictWord }}</p>
            <p>Phonetic: {{ phonetic }}</p>
            <p>Definition: {{ definition }}</p>
        </div>

    </div>

</div>

<!-- Vue.js cdn link -->
<script src="https://unpkg.com/vue@3.4.31/dist/vue.global.js"></script>

<!-- App js -->
<script src="scripts/app.js"></script>

</body>
</html>
